<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spurth Beta Download</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #6C5CE7;
      --accent-light: #8B7BFF;
      --bg: #0F1020;
      --card: rgba(255,255,255,0.05);
      --text: #FFFFFF;
      --muted: rgba(255,255,255,0.65);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Manrope', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(
          600px 600px at 20% 20%,
          rgba(108,92,231,0.25),
          transparent 60%
        ),
        radial-gradient(
          500px 500px at 80% 30%,
          rgba(139,123,255,0.18),
          transparent 60%
        ),
        var(--bg);

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .card {
      width: 100%;
      max-width: 540px;
      padding: 48px 40px;
      background: var(--card);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(108,92,231,0.15);
      color: var(--accent-light);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
      border: 1px solid rgba(108,92,231,0.25);
    }

    h1 {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      padding: 16px 28px;
      border-radius: 14px;
      text-decoration: none;

      background: linear-gradient(
        135deg,
        var(--accent),
        var(--accent-light)
      );

      color: white;
      font-size: 16px;
      font-weight: 700;

      box-shadow: 0 12px 35px rgba(108,92,231,0.35);
      transition: all 0.25s ease;
    }

    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(108,92,231,0.45);
    }

    .note {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    footer {
      margin-top: 32px;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>

  <div class="card">

    <img
      src="logo.png"
      alt="Spurth Logo"
      class="logo"
    >

    <div class="badge">Beta Release Available</div>

    <h1>Download Spurth Beta</h1>

    <p>
      Be among the first to experience Spurth — the platform for discovering,
      hosting, and joining events and activities.
    </p>

    <a
      href="app-release.apk"
      download="app-release.apk"
      class="download-btn"
    >
      ⬇ Download APK
    </a>

    <div class="note">
      Android beta version • APK size may vary • Feedback appreciated
    </div>

    <footer>
      © 2026 Spurth. All rights reserved.
    </footer>

  </div>

</body>
</html>
